name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build APK
        run: ./gradlew :android-app:assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: android-app/build/outputs/apk/release/*.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick
      - name: Generate Icon
        run: |
          mkdir -p desktop/src/main/resources/icons
          convert -background none -resize 512x512 lan-chat-full-optimized.svg desktop/src/main/resources/icons/icon.png
      - name: Build DEB
        run: ./gradlew :desktop:jpackage
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: Linux-DEB
          path: desktop/build/jpackage/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Generate Icon
        run: |
          mkdir -Force desktop\src\main\resources\icons
          magick -background none lan-chat-full-optimized.svg -resize 256x256 desktop\src\main\resources\icons\icon.ico
      - name: Build EXE/MSI
        run: ./gradlew :desktop:jpackage
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: desktop/build/jpackage/*.exe
          
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Generate Icon
        run: |
          mkdir -p desktop/src/main/resources/icons
          magick -background none lan-chat-full-optimized.svg -resize 512x512 desktop/src/main/resources/icons/icon.icns || true
          # Fallback if magick fails
          if [ ! -f desktop/src/main/resources/icons/icon.icns ]; then
            touch desktop/src/main/resources/icons/icon.icns
          fi
      - name: Build DMG
        run: ./gradlew :desktop:jpackage
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: desktop/build/jpackage/*.dmg

  release:
    needs: [build-android, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Android-APK/*.apk
            Linux-DEB/*.deb
            Windows-Installer/*.exe
            macOS-DMG/*.dmg
